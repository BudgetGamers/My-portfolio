<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Status | BudgetGamers</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../colorblind.css">
    <script>
        if (localStorage.getItem('grayscale') === 'true') {
            document.documentElement.classList.add('grayscale');
        }
    </script>
    <script src="../colorblind.js"></script>
    <link rel="icon" href="../Images/Logo.png">
</head>

<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <a href="../index.html" class="nav-logo">
            <img src="../Images/Logo.png" alt="Logo">
            <span>BudgetGamers</span>
        </a>
        <div class="nav-links">
            <a href="../index.html" class="nav-link">Home</a>
            <a href="../How_To_Join/index.html" class="nav-link">How to Join</a>
            <a href="index.html" class="nav-link active">Server Status</a>
            <a href="../Modpacks/index.html" class="nav-link">Modpacks</a>
            <a href="https://github.com/BudgetGamers" target="_blank" class="nav-link">GitHub</a>
            <a href="https://discord.gg/fDvucph7B3" target="_blank" class="nav-link">Discord</a>
        </div>
        <div class="nav-actions">
            <button id="colorblind-toggle" title="Toggle Accessibility Mode">
                <div class="bw-square"></div>
            </button>
        </div>
    </nav>

    <!-- Background Blobs -->
    <div class="background-blob blob-1"></div>
    <div class="background-blob blob-2"></div>

    <main class="page-container">
        <header class="header" style="text-align: center; margin-bottom: 40px;">
            <h1 class="hero-title" style="font-size: 3rem;">Server Status</h1>
            <p class="hero-subtitle">Live updates from the BudgetGamers network</p>
        </header>

        <div id="server-display">
            <!-- Populated by script.js -->
            <div style="text-align: center; color: var(--text-secondary); padding: 50px;">
                <p>Establishing connection to network...</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
