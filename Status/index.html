<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Status | BudgetGamers</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../colorblind.css">
    <script>
        if (localStorage.getItem('grayscale') === 'true') {
            document.documentElement.classList.add('grayscale');
        }
    </script>
    <script src="../colorblind.js"></script>
    <link rel="icon" href="../Images/Logo.png">
</head>

<body>
    <button id="colorblind-toggle" title="Toggle Black and White Mode">
        <div class="bw-square"></div>
    </button>
    <div class="background-blob blob-1"></div>
    <div class="background-blob blob-2"></div>

    <main class="container">
        <a href="../index.html" class="back-link">← Back to Portfolio</a>
        
        <div class="profile-card">
            <header class="status-header">
                <h1 class="title">Server Status</h1>
                <p class="subtitle">Live updates from the BudgetGamers network</p>
            </header>

            <div id="server-display">
                <!-- Populated by script.js -->
                <p>Establishing connection to network...</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
