name: AMP Status Check

on:
  schedule:
    - cron: '*/30 * * * *'  # Runs every 30 mins
  workflow_dispatch:       # Allows manual trigger

jobs:
  check-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # <--- THIS IS THE MISSING PIECE
        
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github  # Ensure this tag matches what you set in Tailscale

      - name: Check AMP Web Service
        id: check_step
        run: |
          if curl -s --connect-timeout 30 http://100.74.84.116:8081; then
            echo "status=online" >> $GITHUB_OUTPUT
          else
            echo "status=offline" >> $GITHUB_OUTPUT
          fi

      - name: Update Status File
        run: |
          # Create the file
          echo "{\"status\": \"online\", \"last_updated\": \"$(date)\"}" > status.json
          
          # Setup Git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Commit and Push
          git add status.json
          git commit -m "chore: update server status [skip ci]" || exit 0
          git push origin main