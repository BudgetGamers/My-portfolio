name: AMP Status Check

on:
  schedule:
    - cron: '*/5 * * * *'  # Runs every 5 mins
  workflow_dispatch:       # Allows manual trigger

jobs:
  check-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # <--- THIS IS THE MISSING PIECE

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github  # Ensure this tag matches what you set in Tailscale

      - name: Fetch Live AMP Data
        run: |
          # 1. Login to get a sessionID
          SESSION_RESPONSE=$(curl -s -X POST "http://100.74.84.116:8081/API/Core/Login" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "{\"Username\": \"${{ secrets.AMP_USERNAME }}\", \"Password\": \"${{ secrets.AMP_PASSWORD }}\", \"Token\": \"\", \"RememberMe\": false}")

          # 2. Extract sessionID (using lowercase 's' to match AMP's response)
          SESSION_ID=$(echo $SESSION_RESPONSE | jq -r '.sessionID // .SessionID')

          # 3. Check if we actually got a session ID
          if [ "$SESSION_ID" == "null" ] || [ -z "$SESSION_ID" ]; then
            echo "Login failed! Full response from AMP was:"
            echo "$SESSION_RESPONSE"
            exit 1
          fi

          echo "Login successful. Session ID obtained."

          # 4. Use the sessionID to get instances
          curl -f -s -X POST "http://100.74.84.116:8081/API/ADSModule/GetInstances" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "{\"SESSIONID\": \"$SESSION_ID\"}" \
            -o status.json

      - name: Update Status File
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add status.json
          git commit -m "chore: live amp update [skip ci]" || exit 0
          git push