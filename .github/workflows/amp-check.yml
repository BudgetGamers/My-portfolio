name: AMP Status Check

on:
  schedule:
    - cron: '*/30 * * * *'  # Runs every 30 mins
  workflow_dispatch:       # Allows manual trigger

jobs:
  check-server:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github  # Ensure this tag matches what you set in Tailscale

      - name: Check AMP Web Service
        id: check_step
        run: |
          if curl -s --connect-timeout 30 http://100.74.84.116:8081; then
            echo "status=online" >> $GITHUB_OUTPUT
          else
            echo "status=offline" >> $GITHUB_OUTPUT
          fi

      - name: Update Status File
        run: |
          echo "{\"status\": \"${{ steps.check_step.outputs.status }}\", \"last_updated\": \"$(date)\"}" > status.json
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add status.json
          git commit -m "Update server status" || exit 0
          git push